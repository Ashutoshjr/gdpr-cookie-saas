version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cc_sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: src/CookieConsent.API/Dockerfile
    container_name: cc_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=CookieConsentDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
      - Jwt__Secret=c0ok13-c0ns3nt-s3cr3t-k3y-ch4ng3-1n-pr0d-32ch
      - Jwt__Issuer=CookieConsentAPI
      - Jwt__Audience=CookieConsentDashboard
      - Jwt__ExpiryHours=24
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

volumes:
  sqldata:
